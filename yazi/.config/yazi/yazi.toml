[mgr]
# Ratio of the columns (Parent : Current : Preview)
ratio          = [ 1, 4, 3 ]
sort_by        = "alphabetical"
sort_dir_first = true
show_hidden    = false

# Shows the file size on the right side of the list
linemode       = "size" 

[preview]
wrap            = "yes"
tab_size        = 2
max_width       = 1000
max_height      = 1000
image_filter    = "triangle" # Better quality for Chafa previews
image_quality   = 75

[opener]
edit = [
	{ run = 'nano "$@"', block = true, desc = "Edit with Nano" }
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open with System Default" }
]

[plugin]
preload = [
	{ name = "*", run = "mime" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "application/pdf", run = "pdf" }
]
