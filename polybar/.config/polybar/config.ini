[colors]
# CC is the transparency (80%). This makes it "Glass" but not "Invisible"
background = #CC101213
background-alt = #101213
foreground = #e3eaf2
primary = #4aa228
secondary = #7aa2f7
alert = #f7768e
disabled = #585b70


[bar/top]
monitor = ${env:MONITOR:}
width = 100%
height = 25pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3
padding-left = 1
padding-right = 1
module-margin = 10px

font-0 = "MesloLGS Nerd Font:pixelsize=11;2"

# --- THE LAYOUT ---
modules-left = powermenu
modules-right = xkeyboard wlan eth pulseaudio battery date

cursor-click = pointery
enable-ipc = true

[bar/bottom]
monitor = ${env:MONITOR:}
bottom = true
width = 100%
height = 25pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3
padding-left = 1
padding-right = 1
module-margin = 10px

font-0 = "MesloLGS Nerd Font:pixelsize=11;2"

# --- THE LAYOUT ---
modules-left = xworkspaces xwindow
modules-right = filesystem memory cpu systray

cursor-click = pointery
enable-ipc = true

# --- Tray Settings ---
tray-position = none
tray-padding = 1
tray-maxsize = 10
tray-background = ${colors.background}
tray-offset-x = 0
tray-offset-y = 0


[module/systray]
type = internal/tray
format-margin = 4pt
tray-spacing = 8pt


[module/xworkspaces]
type = internal/xworkspaces
label-active = "%name%"
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2


[module/xwindow]
type = internal/xwindow
label = "%title:0:40:...%"
label-foreground = ${colors.foreground}
label-underline = ${colors.primary}

label-empty = "Linux Mint Desktop"
label-empty-foreground = ${colors.foreground}
label-empty-underline = ${colors.primary}


[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

# Wrap the text in the Alacritty command with our hidden title!
format-mounted = %{A1:alacritty --class yazi_fm -e yazi &:}ÔĒÜ <label-mounted>%{A}
format-mounted-foreground = ${colors.foreground}

# The actual text showing the percentage or free space
label-mounted = %percentage_used%%
label-mounted-foreground = ${colors.foreground}

format-unmounted = <label-unmounted>
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

# This allows you to scroll anywhere on the volume text/icon
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}
#format-volume-underline = #cc241d

# Icon changes as you scroll
ramp-volume-0 = "ůįēŅ"
ramp-volume-1 = "ůįĖÄ"
ramp-volume-2 = "ůįēĺ"
ramp-volume-foreground = ${colors.foreground}
#${colors.primary}

# Muted state
label-muted = "ůįĖĀ Muted"
label-muted-foreground = ${colors.foreground}
#${colors.disabled}

# --- Mouse Actions ---
# Left click: Toggle Mute
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
# Right click: Open the beautiful Rofi Audio Menu!
click-right = /home/i3-pj/dotfiles/rofi/.config/rofi/scripts/rofi-audio-menu.sh


[module/xkeyboard]
type = internal/xkeyboard

# Ignore internal CapsLock/NumLock indicators, we just want the language
blacklist-0 = num lock
blacklist-1 = scroll lock

# Format it with a keyboard icon and wrap it in our Rofi click action!
format = %{A1:/home/i3-pj/dotfiles/rofi/.config/rofi/scripts/rofi-keyboard.sh:} Ó¨Ā <label-layout>%{A} 
format-foreground = ${colors.foreground}
#${colors.primary}

label-layout = %layout%
label-layout-foreground = ${colors.foreground}


[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM"
format-prefix-foreground = ${colors.foreground}

# Added the percentage in brackets, and wrapped it in a click action
format = %{A1:alacritty -T sysmon -e btop &:} <bar-used> <label> %{A}

# The RAM readout (Used / Total)
label = %gb_used% / %gb_total%

bar-used-width = 12

# Using a thick, continuous horizontal dash (U+2501)
bar-used-fill = ‚ĒĀ
bar-used-indicator = ‚ĒĀ
bar-used-empty = ‚ĒĀ

bar-used-empty-foreground = #3b4261
bar-used-indicator-foreground = #ffffff


[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.foreground}

# We include BOTH the text label and the ramp graph
format = %{A1:alacritty -T sysmon -e btop &:} <bar-load> <label> %{A}

# The clickable percentage (opens btop!)
label = %{A1:alacritty -T sysmon -e btop &:}%percentage:2%%%{A}

bar-load-width = 12

# Using the exact same continuous horizontal dash (U+2501)
bar-load-fill = ‚ĒĀ
bar-load-indicator = ‚ĒĀ
bar-load-empty = ‚ĒĀ

bar-load-empty-foreground = #3b4261
bar-load-indicator-foreground = #ffffff


[module/date]
type = internal/date
interval = 1
date-alt = %H:%M
date = %A %B %d, %H:%M
# Minty Green Text for the center clock
label = "%date% "
label-foreground = ${colors.foreground}
label-font = 1

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3.0

# Wrap the connected output in a Left-Click (A1) action tag
format-connected = %{A1:/home/i3-pj/dotfiles/rofi/.config/rofi/scripts/rofi-wifi-menu.sh:}<ramp-signal> <label-connected>%{A}
format-connected-foreground = ${colors.primary}
label-connected = %essid% %local_ip%
label-connected-foreground = ${colors.foreground}

# Wrap the disconnected output too!
format-disconnected = %{A1:/home/i3-pj/dotfiles/rofi/.config/rofi/scripts/rofi-wifi-menu.sh:}ůį§ģ Disconnected%{A}
format-disconnected-foreground = ${colors.alert}

# The dynamic signal strength icons
ramp-signal-0 = ůį§Į
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®

[module/eth]
type = internal/network
interface-type = wired
interval = 3.0

# Wrap the ethernet output (Icon + IP Address) in the action tag
format-connected = %{A1:/home/i3-pj/dotfiles/rofi/.config/rofi/scripts/rofi-wifi-menu.sh:}ůįąÄ <label-connected>%{A}
format-connected-foreground = ${colors.foreground}
#${colors.primary}
label-connected = %local_ip%
label-connected-foreground = ${colors.foreground}

format-disconnected = %{A1:/home/i3-pj/dotfiles/rofi/.config/rofi/scripts/rofi-wifi-menu.sh:}ůįąā Disconnected%{A}
format-disconnected-foreground = ${colors.alert}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC
poll-interval = 5

# --- Full ---
format-full = <label-full>
format-full-prefix = "ÔČÄ  "  
format-full-prefix-foreground = ${colors.foreground}

label-full = %percentage%%
label-full-foreground = ${colors.foreground}

# --- Discharging (On Battery) ---
# We use the dynamic ramp (icons + colors) here
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

# 0-10% (red)
ramp-capacity-0 = "ÔČĄ "
#ramp-capacity-0-foreground = #fc4a4a
ramp-capacity-0-foreground = ${colors.foreground}

# 10-20% (red)
ramp-capacity-1 = "ÔČÉ "
#ramp-capacity-1-foreground = #fc4a4a
ramp-capacity-1-foreground = ${colors.foreground}

# 20-50% (orange)
ramp-capacity-2 = "ÔČā "
#ramp-capacity-2-foreground = #46ff34
ramp-capacity-2-foreground = ${colors.foreground}

# 50-90% (green)
ramp-capacity-3 = "ÔČĀ "
#ramp-capacity-3-foreground = #46ff34
ramp-capacity-3-foreground = ${colors.foreground}

# 90-100% (green)
ramp-capacity-4 = "ÔČÄ " 
#ramp-capacity-4-foreground = #46ff34
ramp-capacity-4-foreground = ${colors.foreground}

# --- Charging (Plugged In) ---
format-charging = <ramp-capacity>ůĪźĆ <label-charging>

label-charging = %percentage%%
label-charging-foreground = ${colors.foreground}


[module/powermenu]
type = custom/text
content = "ůįź•"
#content-foreground = ${colors.alert}
content-foreground = ${colors.foreground}
content-padding = 1
click-left = ~/.config/rofi/powermenu/type-1/powermenu.sh &


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
