# --- Prefix Key Setup ---
# Unbind the default Ctrl+b prefix
unbind C-b

# Set the new prefix to Ctrl+Space
set -g prefix C-Space

# Allow sending Ctrl+Space to programs inside tmux if you press it twice
bind C-Space send-prefix

# --- Easier Window Splits ---
# Split side-by-side (Visual vertical line)
bind h split-window -h

# Split top-and-bottom (Visual horizontal line)
bind v split-window -v

# Unbind the clunky default keys
unbind '"'
unbind %

# --- Fast Window (Tab) Switching ---
# Use Shift + Left/Right Arrow to cycle through tabs
bind -n S-Left previous-window
bind -n S-Right next-window

# --- Fast Pane Switching ---
# Use Alt + Arrow Keys to move between splits without the prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Quality of Life ---
set -g mouse on               # Enable mouse scrolling/clicking
setw -g aggressive-resize on

# Destroy session when closing the Alacritty window
set-option -g destroy-unattached on

# Allow mouse scrolling to work in "alternate screen" apps (like nano, man, etc.)
bind -n WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind -n WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

set -s escape-time 0          # Stop delay when hitting Esc (vital for Vim/Yazi)
set -g history-limit 50000    # Bigger scrollback buffer
set -g base-index 1           # Start windows at 1 (easier to reach)
setw -g pane-base-index 1     # Start panes at 1
# Renumber windows automatically when one is closed
set -g renumber-windows on

# --- Colors & Terminal Fixes ---
set -g default-terminal "screen-256color"
set -as terminal-features ",alacritty:RGB"

# --- The Floating Mint Status Bar ---
set -g status-position bottom
set -g status-justify centre
set -g status-style bg=default,fg='#4aa228'

# --- Status Bar Padding (Double-Line Hack) ---
set -g status 2
set -g status-format[0] ""
set -g status-format[1] "#[align=left]#{T:status-left}#[align=centre]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right]#{T:status-right}"

# --- Left: Session Pill ---
set -g status-left-length 50
set -g status-left "#[fg=#4aa228,bg=default]▌#[fg=#4aa228,bg=default,bold]  Mint "

# --- Middle: Window Tabs (Pills) ---
# Inactive window style
setw -g window-status-format "#[fg=#585b70,bg=default] #I:#W "
# Active window style (The Floating Pill)
setw -g window-status-current-format "#[fg=#4aa228,bg=default,bold] #I:#W"

# --- Right: System Heartbeat ---
set -g status-right-length 100
set -g status-right "#[fg=#4aa228,bg=default,bold] %H:%M #[fg=#4aa228,bg=default]▌"

# --- TPM (Plugin Manager) ---
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Use Vim keys in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection like in Vim
bind -T copy-mode-vi v send -X begin-selection

# Setup 'y' to copy to system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"

# Drag to copy with mouse (automatically goes to system clipboard)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"

# Exit the server when the last session is closed
set -s exit-empty on
set -s exit-unattached on
