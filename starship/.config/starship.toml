add_newline = true

format = """
[έΨΝ](fg:#4aa228)\
$os\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$golang\
$nodejs\
$python\
$rust\
$cmd_duration\
$line_break\
$character"""

[fill]
symbol = " "

[line_break]
disabled = false

[os]
disabled = false
style = "bold fg:#4aa228"
format = "[ ≤░μφ ]($style)" 

[directory]
style = "bold fg:#a6adc8"
format = "[$path]($style)"
truncation_length = 3

# --- Smart Language Detection ---
[python]
symbol = " ≤░Νι "
style = "bold fg:#f9e2af" # Soft gold
format = "[$symbol$version ]($style)"

[nodejs]
symbol = "≤░Οβ "
style = "bold fg:#f9e2af" # Soft gold
format = "[$symbol$version ]($style)"

[rust]
symbol = "Όηρ "
style = "bold fg:#fc4a4a" # Red alert
format = "[$symbol$version ]($style)"

[c]
symbol = "Όαη "
style = "bold fg:#8caaee" # Ice blue
format = "[$symbol$version ]($style)"

[golang]
symbol = "Όαπ "
style = "bold fg:#8caaee" # Ice blue
format = "[$symbol$version ]($style)"


# --- Git Information ---
[git_branch]
symbol = " ΎΡα"
style = "bold fg:#cba6f7"
format = "[$symbol $branch ]($style)"

[git_status]
style = "bold fg:#fc4a4a"
format = "[$all_status$ahead_behind ]($style)"


# --- Performance Tracking ---
[cmd_duration]
min_time = 2000 # Only shows up if a command takes longer than 2 seconds (2000ms)
format = "[ΎΚΤ $duration ](bold fg:#a6adc8)" # Muted silver so it doesn't distract


# --- The Prompt Cursor ---
[character]
success_symbol = " [έηε](bold fg:#4aa228) "
error_symbol = " [έηε](bold fg:#fc4a4a) "
